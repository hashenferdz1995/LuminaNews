<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Controller | LuminaNews Admin</title>
    <link rel="stylesheet" href="style.css?v=6.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #020408; color: white; font-family: sans-serif; margin: 0; }
        #admin-auth { 
            position: fixed; inset: 0; background: #000; z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: #0a0c10; padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .form-input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: #00d2ff; color: black; }
        .btn-green { background: #10B981; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        th { font-size: 0.8rem; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="admin-auth">
        <div style="background: #111; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #00d2ff;">
            <h2>Lumina Admin Access</h2>
            <input type="password" id="admin-key" class="form-input" placeholder="Admin Key">
            <button onclick="authorizeAdmin()" class="btn btn-blue" style="width: 100%;">ENTER COMMAND CENTER</button>
            <p id="err" style="color: red; display: none; margin-top: 10px;">Access Denied</p>
        </div>
    </div>

    <div id="admin-main" class="hidden">
        <header style="background: #0a0c10; padding: 20px 40px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
            <h3>Lumina Pro Master Node</h3>
            <button onclick="window.location.reload()" class="btn" style="background: #222; color: white;">Refresh Session</button>
        </header>

        <div class="container">
            <div class="card">
                <h3>Bulk License Generator</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="number" id="lic-count" value="10" class="form-input" style="width: 100px;">
                    <select id="lic-plan" class="form-input" style="width: 200px;">
                        <option value="3">3 Days Trial</option>
                        <option value="30">30 Days</option>
                        <option value="90">90 Days</option>
                        <option value="365">1 Year</option>
                        <option value="9999">Lifetime</option>
                    </select>
                    <button onclick="generateBulk()" class="btn btn-green">Generate Keys</button>
                </div>
                <textarea id="output" class="form-input" style="height: 100px; margin-top: 10px;" readonly placeholder="Generated keys will appear here..."></textarea>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between;">
                    <h3>License Stock Monitor</h3>
                    <button onclick="loadStock()" class="btn btn-blue" style="padding: 5px 15px;">Refresh Stock</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Redeem Code</th>
                                <th>Plan</th>
                                <th>Status</th>
                                <th>Hardware ID</th>
                            </tr>
                        </thead>
                        <tbody id="stock-list">
                            <tr><td colspan="4">Click Refresh Stock to load...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("Admin Script Loaded V6.0");
        const API = "https://luminanews.online/api";

        function authorizeAdmin() {
            const key = document.getElementById('admin-key').value;
            if(key === "ADMIN123456") {
                console.log("Access Granted");
                document.getElementById('admin-auth').remove();
                document.getElementById('admin-main').classList.remove('hidden');
                loadStock();
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }

        async function loadStock() {
            console.log("Loading stock...");
            const k = "ADMIN123456";
            const list = document.getElementById('stock-list');
            list.innerHTML = '<tr><td colspan="4">Loading data...</td></tr>';

            try {
                const res = await fetch(`${API}/admin/license/list`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ admin_key: k })
                });
                const data = await res.json();
                
                if(data.status === 'ok') {
                    list.innerHTML = '';
                    data.licenses.forEach(l => {
                        list.innerHTML += `
                            <tr>
                                <td>${l.redeem_code}</td>
                                <td>${l.plan_days} Days</td>
                                <td style="color: ${l.status === 'available' ? '#10B981' : '#F59E0B'}">${l.status.toUpperCase()}</td>
                                <td style="opacity: 0.5;">${l.hwid || 'Available'}</td>
                            </tr>
                        `;
                    });
                    console.log("Stock loaded");
                }
            } catch(e) { 
                console.error(e); 
                list.innerHTML = '<tr><td colspan="4" style="color:red">Error loading stock. Try Refresh.</td></tr>';
            }
        }

        async function generateBulk() {
            const p = document.getElementById('lic-plan').value;
            const c = document.getElementById('lic-count').value;
            const k = "ADMIN123456";

            try {
                const res = await fetch(`${API}/admin/license/bulk-generate`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ plan: p, count: c, admin_key: k })
                });
                const data = await res.json();
                if(data.status === 'ok') {
                    document.getElementById('output').value = data.generated_codes.join('\n');
                    alert("Generated success!");
                    loadStock();
                }
            } catch(e) { alert("Error generating."); }
        }
    </script>
</body>
</html>
